<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a141a"/>
      <stop offset="50%" stop-color="#0a0a0b"/>
      <stop offset="100%" stop-color="#0d0a1f"/>
    </linearGradient>
    <radialGradient id="g1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(34,211,238,0.30)"/>
      <stop offset="100%" stop-color="rgba(34,211,238,0)"/>
    </radialGradient>
    <radialGradient id="g2" cx="10%" cy="90%" r="40%">
      <stop offset="0%" stop-color="rgba(168,85,247,0.40)"/>
      <stop offset="100%" stop-color="rgba(168,85,247,0)"/>
    </radialGradient>
    <radialGradient id="g3" cx="90%" cy="10%" r="40%">
      <stop offset="0%" stop-color="rgba(34,197,94,0.20)"/>
      <stop offset="100%" stop-color="rgba(34,197,94,0)"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5"/></filter>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#grid)"/>
  <rect width="1200" height="900" fill="url(#g1)"/>
  <rect width="1200" height="900" fill="url(#g2)"/>
  <rect width="1200" height="900" fill="url(#g3)"/>

  <!-- Central node large -->
  <g transform="translate(600,450)">
    <circle r="90" fill="rgba(34,211,238,0.05)" stroke="rgba(34,211,238,0.4)" stroke-width="1" stroke-dasharray="3 5"/>
    <circle r="56" fill="rgba(34,211,238,0.12)" stroke="rgba(34,211,238,0.6)" stroke-width="1.5"/>
    <circle r="22" fill="rgba(34,211,238,0.7)" filter="url(#glow)"/>
    <circle r="10" fill="#fff"/>
  </g>

  <!-- Satellite nodes -->
  <g>
    <g transform="translate(220,250)">
      <circle r="36" fill="rgba(168,85,247,0.10)" stroke="rgba(168,85,247,0.5)" stroke-width="1.2"/>
      <circle r="10" fill="rgba(168,85,247,0.85)" filter="url(#glow)"/>
    </g>
    <g transform="translate(960,230)">
      <circle r="32" fill="rgba(34,197,94,0.10)" stroke="rgba(34,197,94,0.55)" stroke-width="1.2"/>
      <circle r="9" fill="rgba(34,197,94,0.85)" filter="url(#glow)"/>
    </g>
    <g transform="translate(280,680)">
      <circle r="30" fill="rgba(34,211,238,0.10)" stroke="rgba(34,211,238,0.5)" stroke-width="1.2"/>
      <circle r="8" fill="rgba(34,211,238,0.85)" filter="url(#glow)"/>
    </g>
    <g transform="translate(950,690)">
      <circle r="34" fill="rgba(217,70,239,0.10)" stroke="rgba(217,70,239,0.55)" stroke-width="1.2"/>
      <circle r="9" fill="rgba(217,70,239,0.85)" filter="url(#glow)"/>
    </g>
    <g transform="translate(140,460)">
      <circle r="24" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
      <circle r="6" fill="rgba(255,255,255,0.75)"/>
    </g>
    <g transform="translate(1060,470)">
      <circle r="26" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
      <circle r="6" fill="rgba(255,255,255,0.75)"/>
    </g>
  </g>

  <!-- Connections -->
  <g fill="none" stroke-width="1.3" stroke-dasharray="4 6">
    <line x1="600" y1="450" x2="220" y2="250" stroke="rgba(168,85,247,0.55)"/>
    <line x1="600" y1="450" x2="960" y2="230" stroke="rgba(34,197,94,0.5)"/>
    <line x1="600" y1="450" x2="280" y2="680" stroke="rgba(34,211,238,0.55)"/>
    <line x1="600" y1="450" x2="950" y2="690" stroke="rgba(217,70,239,0.55)"/>
    <line x1="600" y1="450" x2="140" y2="460" stroke="rgba(255,255,255,0.30)"/>
    <line x1="600" y1="450" x2="1060" y2="470" stroke="rgba(255,255,255,0.30)"/>
  </g>

  <!-- Code-like floating snippets -->
  <g font-family="ui-monospace, 'Geist Mono', monospace" font-size="13" fill="rgba(255,255,255,0.45)">
    <text x="60" y="120">{ "type": "message" }</text>
    <text x="900" y="120">await client.send()</text>
    <text x="80" y="820">connect.on("ready")</text>
    <text x="880" y="820">→ webhook.dispatch</text>
  </g>

  <!-- Particles -->
  <g fill="rgba(255,255,255,0.4)">
    <circle cx="380" cy="180" r="2"/>
    <circle cx="800" cy="170" r="2"/>
    <circle cx="400" cy="780" r="2"/>
    <circle cx="800" cy="790" r="1.5"/>
  </g>
</svg>
