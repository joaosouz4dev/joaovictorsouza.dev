<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1a13"/>
      <stop offset="50%" stop-color="#0a0a0b"/>
      <stop offset="100%" stop-color="#13130d"/>
    </linearGradient>
    <radialGradient id="g1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="rgba(34,197,94,0.40)"/>
      <stop offset="100%" stop-color="rgba(34,197,94,0)"/>
    </radialGradient>
    <radialGradient id="g2" cx="80%" cy="70%" r="50%">
      <stop offset="0%" stop-color="rgba(254,188,46,0.25)"/>
      <stop offset="100%" stop-color="rgba(254,188,46,0)"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#grid)"/>
  <rect width="1200" height="900" fill="url(#g1)"/>
  <rect width="1200" height="900" fill="url(#g2)"/>

  <!-- Stacked catalog cards (fan) -->
  <g transform="translate(280,180)">
    <!-- Back card -->
    <g transform="rotate(-8) translate(40,30)">
      <rect width="280" height="380" rx="22" fill="rgba(15,28,18,0.88)" stroke="rgba(34,197,94,0.30)" stroke-width="1.2"/>
      <rect x="20" y="20" width="240" height="180" rx="14" fill="rgba(254,188,46,0.20)"/>
      <circle cx="140" cy="110" r="44" fill="rgba(254,188,46,0.40)"/>
      <rect x="20" y="220" width="180" height="12" rx="6" fill="rgba(255,255,255,0.40)"/>
      <rect x="20" y="244" width="120" height="9" rx="4" fill="rgba(255,255,255,0.20)"/>
    </g>
    <!-- Middle card -->
    <g transform="rotate(-2) translate(20,15)">
      <rect width="280" height="380" rx="22" fill="rgba(15,28,18,0.93)" stroke="rgba(34,197,94,0.50)" stroke-width="1.3"/>
      <rect x="20" y="20" width="240" height="180" rx="14" fill="rgba(34,197,94,0.22)"/>
      <circle cx="140" cy="110" r="44" fill="rgba(34,197,94,0.45)"/>
      <rect x="20" y="220" width="200" height="12" rx="6" fill="rgba(255,255,255,0.55)"/>
      <rect x="20" y="244" width="140" height="9" rx="4" fill="rgba(255,255,255,0.30)"/>
      <rect x="20" y="280" width="80" height="28" rx="14" fill="rgba(254,188,46,0.20)" stroke="rgba(254,188,46,0.65)" stroke-width="1"/>
      <text x="60" y="299" fill="rgba(254,188,46,1)" font-family="ui-sans-serif" font-size="12" font-weight="600" text-anchor="middle">R$ 28,90</text>
    </g>
    <!-- Front card -->
    <g>
      <rect width="280" height="380" rx="22" fill="rgba(15,28,18,0.98)" stroke="rgba(34,197,94,0.75)" stroke-width="1.5"/>
      <rect x="20" y="20" width="240" height="180" rx="14" fill="rgba(34,197,94,0.18)"/>
      <!-- burger-ish icon -->
      <g transform="translate(140,110)" fill="rgba(34,197,94,0.85)">
        <ellipse cx="0" cy="-22" rx="58" ry="14"/>
        <rect x="-58" y="-8" width="116" height="14" fill="rgba(254,188,46,0.85)"/>
        <rect x="-58" y="8" width="116" height="14" rx="2" fill="rgba(217,119,6,0.85)"/>
        <ellipse cx="0" cy="22" rx="58" ry="12" fill="rgba(180,83,9,0.9)"/>
      </g>
      <rect x="20" y="220" width="220" height="14" rx="7" fill="rgba(255,255,255,0.70)"/>
      <text x="20" y="232" fill="rgba(255,255,255,0)" font-family="ui-sans-serif" font-size="14"></text>
      <rect x="20" y="246" width="160" height="9" rx="4" fill="rgba(255,255,255,0.35)"/>
      <g transform="translate(20,280)">
        <rect width="100" height="32" rx="16" fill="rgba(34,197,94,0.20)" stroke="rgba(34,197,94,0.7)" stroke-width="1"/>
        <text x="50" y="22" fill="rgba(167,243,208,1)" font-family="ui-sans-serif" font-size="13" font-weight="600" text-anchor="middle">R$ 32,90</text>
      </g>
      <g transform="translate(132,280)">
        <rect width="128" height="32" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.20)" stroke-width="1"/>
        <text x="64" y="22" fill="rgba(255,255,255,0.7)" font-family="ui-sans-serif" font-size="12" text-anchor="middle">Adicionar +</text>
      </g>
    </g>
  </g>

  <!-- WhatsApp bubble incoming order -->
  <g transform="translate(680,420)">
    <path d="M0 0 H280 a20 20 0 0 1 20 20 V120 a20 20 0 0 1 -20 20 H32 L0 170 V20 a20 20 0 0 1 20 -20 Z"
          fill="rgba(34,197,94,0.18)" stroke="rgba(34,197,94,0.7)" stroke-width="1.5"/>
    <text x="22" y="34" fill="rgba(167,243,208,1)" font-family="ui-sans-serif" font-size="12" letter-spacing="0.12em">NOVO PEDIDO</text>
    <text x="22" y="62" fill="#fff" font-family="ui-sans-serif" font-size="18" font-weight="600">João Lanches</text>
    <text x="22" y="86" fill="rgba(255,255,255,0.7)" font-family="ui-sans-serif" font-size="14">2x Burger especial</text>
    <text x="22" y="106" fill="rgba(255,255,255,0.7)" font-family="ui-sans-serif" font-size="14">1x Refrigerante 2L</text>
    <text x="22" y="130" fill="rgba(254,188,46,1)" font-family="ui-sans-serif" font-size="15" font-weight="700">Total R$ 78,80</text>
  </g>

  <!-- Sparkle particles -->
  <g fill="rgba(255,255,255,0.45)">
    <circle cx="120" cy="120" r="2"/>
    <circle cx="1090" cy="140" r="2"/>
    <circle cx="80" cy="780" r="1.5"/>
    <circle cx="1100" cy="800" r="1.5"/>
    <circle cx="600" cy="100" r="2"/>
  </g>

  <!-- WhatsApp glyph corner -->
  <g transform="translate(1050,80)" opacity="0.85">
    <circle r="32" fill="rgba(34,197,94,0.20)" stroke="rgba(34,197,94,0.7)" stroke-width="1.5"/>
    <path d="M-12 -2 a14 14 0 1 1 6 12 L-13 12 L-9 5 a14 14 0 0 1 -3 -7 Z"
          fill="rgba(34,197,94,0.95)" filter="url(#glow)"/>
  </g>
</svg>
