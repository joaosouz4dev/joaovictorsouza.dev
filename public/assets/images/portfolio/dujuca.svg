<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a1f"/>
      <stop offset="50%" stop-color="#0a0a0b"/>
      <stop offset="100%" stop-color="#1f140a"/>
    </linearGradient>
    <radialGradient id="g1" cx="25%" cy="30%" r="50%">
      <stop offset="0%" stop-color="rgba(217,70,239,0.45)"/>
      <stop offset="100%" stop-color="rgba(217,70,239,0)"/>
    </radialGradient>
    <radialGradient id="g2" cx="80%" cy="75%" r="50%">
      <stop offset="0%" stop-color="rgba(254,188,46,0.30)"/>
      <stop offset="100%" stop-color="rgba(254,188,46,0)"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#grid)"/>
  <rect width="1200" height="900" fill="url(#g1)"/>
  <rect width="1200" height="900" fill="url(#g2)"/>

  <!-- Product cards grid -->
  <g>
    <!-- Card 1 -->
    <g transform="translate(160,200)">
      <rect width="200" height="240" rx="20" fill="rgba(15,12,28,0.92)" stroke="rgba(217,70,239,0.4)" stroke-width="1.3"/>
      <rect x="16" y="16" width="168" height="120" rx="12" fill="rgba(217,70,239,0.18)"/>
      <circle cx="100" cy="76" r="36" fill="rgba(217,70,239,0.35)"/>
      <rect x="16" y="152" width="120" height="10" rx="5" fill="rgba(255,255,255,0.55)"/>
      <rect x="16" y="170" width="80" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
      <rect x="16" y="194" width="70" height="22" rx="11" fill="rgba(254,188,46,0.20)" stroke="rgba(254,188,46,0.65)" stroke-width="1"/>
      <text x="51" y="209" fill="rgba(254,188,46,1)" font-family="ui-sans-serif" font-size="11" font-weight="600" text-anchor="middle">-30%</text>
    </g>

    <!-- Card 2 -->
    <g transform="translate(395,235)">
      <rect width="200" height="240" rx="20" fill="rgba(15,12,28,0.92)" stroke="rgba(254,188,46,0.35)" stroke-width="1.3"/>
      <rect x="16" y="16" width="168" height="120" rx="12" fill="rgba(254,188,46,0.16)"/>
      <circle cx="100" cy="76" r="36" fill="rgba(254,188,46,0.30)"/>
      <rect x="16" y="152" width="100" height="10" rx="5" fill="rgba(255,255,255,0.55)"/>
      <rect x="16" y="170" width="70" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
      <rect x="16" y="194" width="84" height="22" rx="11" fill="rgba(34,197,94,0.18)" stroke="rgba(34,197,94,0.55)" stroke-width="1"/>
      <text x="58" y="209" fill="rgba(167,243,208,1)" font-family="ui-sans-serif" font-size="11" font-weight="600" text-anchor="middle">12x s/ juros</text>
    </g>

    <!-- Card 3 -->
    <g transform="translate(630,200)">
      <rect width="200" height="240" rx="20" fill="rgba(15,12,28,0.92)" stroke="rgba(217,70,239,0.4)" stroke-width="1.3"/>
      <rect x="16" y="16" width="168" height="120" rx="12" fill="rgba(217,70,239,0.18)"/>
      <circle cx="100" cy="76" r="36" fill="rgba(217,70,239,0.35)"/>
      <rect x="16" y="152" width="140" height="10" rx="5" fill="rgba(255,255,255,0.55)"/>
      <rect x="16" y="170" width="90" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
      <rect x="16" y="194" width="100" height="22" rx="11" fill="rgba(34,211,238,0.16)" stroke="rgba(34,211,238,0.55)" stroke-width="1"/>
      <text x="66" y="209" fill="rgba(165,243,252,1)" font-family="ui-sans-serif" font-size="11" font-weight="600" text-anchor="middle">frete grátis</text>
    </g>

    <!-- Card 4 -->
    <g transform="translate(870,250)">
      <rect width="180" height="220" rx="20" fill="rgba(15,12,28,0.88)" stroke="rgba(255,255,255,0.15)" stroke-width="1.2"/>
      <rect x="14" y="14" width="152" height="110" rx="11" fill="rgba(124,77,255,0.16)"/>
      <circle cx="90" cy="69" r="32" fill="rgba(124,77,255,0.32)"/>
      <rect x="14" y="138" width="110" height="9" rx="4" fill="rgba(255,255,255,0.45)"/>
      <rect x="14" y="154" width="70" height="8" rx="4" fill="rgba(255,255,255,0.25)"/>
    </g>
  </g>

  <!-- Floating cart pill -->
  <g transform="translate(820,640)">
    <rect width="280" height="80" rx="40" fill="rgba(15,12,28,0.92)" stroke="rgba(254,188,46,0.55)" stroke-width="1.5"/>
    <g transform="translate(28,40)">
      <circle r="22" fill="rgba(254,188,46,0.18)" stroke="rgba(254,188,46,0.7)" stroke-width="1.5"/>
      <path d="M-8 -6 L-3 -6 L-1 7 L9 7 L11 -2 L-1 -2"
            fill="none" stroke="rgba(254,188,46,1)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="2" cy="11" r="2" fill="rgba(254,188,46,1)"/>
      <circle cx="9" cy="11" r="2" fill="rgba(254,188,46,1)"/>
    </g>
    <text x="68" y="36" fill="rgba(255,255,255,0.55)" font-family="ui-sans-serif" font-size="11" letter-spacing="0.18em">CARRINHO</text>
    <text x="68" y="58" fill="#fff" font-family="ui-sans-serif" font-size="20" font-weight="600">R$ 1.299,00</text>
  </g>

  <!-- Discount badge floating -->
  <g transform="translate(160,540) rotate(-8)">
    <rect width="200" height="64" rx="14" fill="rgba(217,70,239,0.95)"/>
    <text x="100" y="28" fill="#fff" font-family="ui-sans-serif" font-size="12" letter-spacing="0.16em" text-anchor="middle" font-weight="600">PROMOÇÃO</text>
    <text x="100" y="52" fill="#fff" font-family="ui-sans-serif" font-size="22" text-anchor="middle" font-weight="700">ATÉ 50% OFF</text>
  </g>

  <!-- Particles -->
  <g fill="rgba(255,255,255,0.4)">
    <circle cx="100" cy="120" r="2"/>
    <circle cx="1090" cy="140" r="2"/>
    <circle cx="80" cy="780" r="1.5"/>
    <circle cx="600" cy="100" r="2"/>
    <circle cx="600" cy="820" r="1.5"/>
  </g>
</svg>
