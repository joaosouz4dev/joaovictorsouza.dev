<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1a13"/>
      <stop offset="50%" stop-color="#0a0a0b"/>
      <stop offset="100%" stop-color="#1a0d1f"/>
    </linearGradient>
    <radialGradient id="g1" cx="20%" cy="25%" r="50%">
      <stop offset="0%" stop-color="rgba(34,197,94,0.45)"/>
      <stop offset="100%" stop-color="rgba(34,197,94,0)"/>
    </radialGradient>
    <radialGradient id="g2" cx="80%" cy="75%" r="50%">
      <stop offset="0%" stop-color="rgba(168,85,247,0.40)"/>
      <stop offset="100%" stop-color="rgba(168,85,247,0)"/>
    </radialGradient>
    <radialGradient id="g3" cx="60%" cy="20%" r="35%">
      <stop offset="0%" stop-color="rgba(34,211,238,0.25)"/>
      <stop offset="100%" stop-color="rgba(34,211,238,0)"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#grid)"/>
  <rect width="1200" height="900" fill="url(#g1)"/>
  <rect width="1200" height="900" fill="url(#g2)"/>
  <rect width="1200" height="900" fill="url(#g3)"/>

  <!-- Message bubbles -->
  <g opacity="0.85">
    <g transform="translate(180,180)">
      <rect width="280" height="80" rx="20" fill="rgba(34,197,94,0.18)" stroke="rgba(34,197,94,0.6)" stroke-width="1.5"/>
      <circle cx="36" cy="40" r="14" fill="rgba(34,197,94,0.7)"/>
      <rect x="64" y="28" width="180" height="8" rx="4" fill="rgba(255,255,255,0.45)"/>
      <rect x="64" y="46" width="120" height="8" rx="4" fill="rgba(255,255,255,0.25)"/>
    </g>
    <g transform="translate(540,300)">
      <rect width="320" height="90" rx="22" fill="rgba(168,85,247,0.20)" stroke="rgba(168,85,247,0.55)" stroke-width="1.5"/>
      <circle cx="40" cy="45" r="14" fill="rgba(168,85,247,0.75)"/>
      <rect x="68" y="32" width="210" height="8" rx="4" fill="rgba(255,255,255,0.45)"/>
      <rect x="68" y="50" width="160" height="8" rx="4" fill="rgba(255,255,255,0.25)"/>
      <rect x="68" y="65" width="100" height="8" rx="4" fill="rgba(255,255,255,0.20)"/>
    </g>
    <g transform="translate(300,470)">
      <rect width="260" height="78" rx="20" fill="rgba(34,211,238,0.15)" stroke="rgba(34,211,238,0.5)" stroke-width="1.5"/>
      <circle cx="36" cy="39" r="13" fill="rgba(34,211,238,0.7)"/>
      <rect x="62" y="27" width="170" height="8" rx="4" fill="rgba(255,255,255,0.40)"/>
      <rect x="62" y="44" width="120" height="8" rx="4" fill="rgba(255,255,255,0.22)"/>
    </g>
    <g transform="translate(700,560)">
      <rect width="300" height="78" rx="20" fill="rgba(34,197,94,0.16)" stroke="rgba(34,197,94,0.55)" stroke-width="1.5"/>
      <circle cx="36" cy="39" r="13" fill="rgba(34,197,94,0.7)"/>
      <rect x="62" y="27" width="200" height="8" rx="4" fill="rgba(255,255,255,0.40)"/>
      <rect x="62" y="44" width="140" height="8" rx="4" fill="rgba(255,255,255,0.22)"/>
    </g>
  </g>

  <!-- Connection lines -->
  <g stroke="rgba(168,85,247,0.35)" stroke-width="1.2" fill="none" stroke-dasharray="4 6">
    <path d="M320 260 Q420 280 540 345"/>
    <path d="M700 390 Q620 430 560 510"/>
    <path d="M430 545 Q580 560 700 600"/>
  </g>

  <!-- Node dots -->
  <g>
    <circle cx="320" cy="260" r="4" fill="rgba(34,197,94,0.9)" filter="url(#glow)"/>
    <circle cx="540" cy="345" r="4" fill="rgba(168,85,247,0.9)" filter="url(#glow)"/>
    <circle cx="430" cy="545" r="4" fill="rgba(34,211,238,0.9)" filter="url(#glow)"/>
    <circle cx="700" cy="600" r="4" fill="rgba(34,197,94,0.9)" filter="url(#glow)"/>
  </g>

  <!-- Floating particles -->
  <g fill="rgba(255,255,255,0.4)">
    <circle cx="120" cy="640" r="2"/>
    <circle cx="980" cy="160" r="2"/>
    <circle cx="1080" cy="430" r="1.5"/>
    <circle cx="60" cy="380" r="1.5"/>
    <circle cx="900" cy="780" r="2"/>
    <circle cx="240" cy="780" r="1.5"/>
  </g>
</svg>
